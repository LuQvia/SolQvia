name: SolQvia Quality Gate
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install beautifulsoup4
      - run: python .github/scripts/phase34_public_preflight.py .
