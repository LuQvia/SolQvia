name: SolQvia Live Smoke Test
on:
  workflow_dispatch:
  schedule:
    - cron: '17 2 * * *'
permissions:
  contents: read
jobs:
  verify-live-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python .github/scripts/phase32_live_smoke_test.py --domain https://solqvia.com
